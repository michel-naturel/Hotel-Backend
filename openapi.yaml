openapi: 3.0.0
info:
  title: Hotel Reservation API
  version: 1.0.0
  description: API for managing hotel rooms and reservations

servers:
  - url: http://localhost:3000

paths:

  /rooms:
    get:
      summary: Get all rooms
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"

    post:
      summary: Create a new room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - number
                - type
                - price
              properties:
                number:
                  type: string
                  example: "101"
                type:
                  type: string
                  example: "single"
                price:
                  type: number
                  example: 200
      responses:
        "200":
          description: Room created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 3


  /rooms/available:
    get:
      summary: Get available rooms for date range
      parameters:
        - name: checkIn
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-07-01"

        - name: checkOut
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-07-05"

      responses:
        "200":
          description: List of available rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"


  /rooms/{id}/reservations:
    get:
      summary: Get reservations for a specific room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1

      responses:
        "200":
          description: List of reservations for the room
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"


  /reservations:
    get:
      summary: Get all reservations
      responses:
        "200":
          description: List of reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"

    post:
      summary: Create a reservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - guestName
                - roomId
                - checkIn
                - checkOut
              properties:
                guestName:
                  type: string
                  example: "Jan"
                roomId:
                  type: integer
                  example: 1
                checkIn:
                  type: string
                  format: date
                  example: "2026-07-01"
                checkOut:
                  type: string
                  format: date
                  example: "2026-07-05"

      responses:
        "200":
          description: Reservation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 5


  /reservations/{id}:
    delete:
      summary: Delete reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 5

      responses:
        "200":
          description: Reservation deleted


components:
  schemas:

    Room:
      type: object
      properties:
        id:
          type: integer
          example: 1
        number:
          type: string
          example: "101"
        type:
          type: string
          example: "single"
        price:
          type: number
          example: 200

    Reservation:
      type: object
      properties:
        id:
          type: integer
          example: 1
        guestName:
          type: string
          example: "Jan"
        roomId:
          type: integer
          example: 1
        checkIn:
          type: string
          format: date
          example: "2026-07-01"
        checkOut:
          type: string
          format: date
          example: "2026-07-05"
